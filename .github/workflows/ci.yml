name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Backstop for anything a per-test timeout can't catch (a hung install or
    # collection): fail in minutes, never run to GitHub's 6h job ceiling.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[test]"

      - name: Lint with ruff
        run: ruff check server/ tests/

      - name: Run tests
        # tests/perf holds wall-clock benchmarks that are unreliable on shared
        # CI runners; run them on demand with `pytest tests/perf`, not in the gate.
        run: pytest tests/ -v --tb=short --ignore=tests/perf

  build-frontend:
    name: Build frontends
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Test Programmer UI
        working-directory: web/programmer
        run: npm run test

      - name: Install and build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

  wheel-smoke:
    name: Wheel smoke (built wheel serves the UI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The wheel bundles the built web assets. A wheel built from a tree that
      # was never `npm run build`-ed installs fine but ships no UI, so build the
      # frontends before packaging.
      - name: Build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install the wheel into a clean venv
        run: |
          python -m venv "${RUNNER_TEMP}/wheel-venv"
          "${RUNNER_TEMP}/wheel-venv/bin/pip" install --upgrade pip
          "${RUNNER_TEMP}/wheel-venv/bin/pip" install dist/*.whl

      - name: Smoke — the installed wheel bundles and serves the UI
        env:
          # Keep the started server's seeded projects out of the checkout.
          OPENAVC_DATA_DIR: ${{ runner.temp }}/openavc-data
        run: |
          "${RUNNER_TEMP}/wheel-venv/bin/python" .github/scripts/wheel_smoke.py
