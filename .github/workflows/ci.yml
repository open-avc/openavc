name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint with ruff
        run: uv run ruff check server/ tests/

      - name: Run tests
        # tests/perf holds wall-clock benchmarks that are unreliable on shared
        # CI runners; run them on demand with `pytest tests/perf`, not in the gate.
        run: uv run pytest tests/ -v --tb=short --ignore=tests/perf

  build-frontend:
    name: Build frontends
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Install and build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build
