name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: write
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Gate: run full test suite before building anything ──────────────
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[test]"

      - name: Lint
        run: ruff check server/ tests/

      - name: Run tests
        # tests/perf holds wall-clock benchmarks that are unreliable on shared
        # CI runners; run them on demand with `pytest tests/perf`, not in the
        # release gate (matches ci.yml).
        run: pytest tests/ -v --tb=short --ignore=tests/perf

  # ── Extract version from tag ────────────────────────────────────────
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Fail the release if the tag and the bundled pyproject version
          # disagree. The installer filename/AppVersion is named from the tag,
          # but the running server reports pyproject's [project].version
          # (version.py -> /api/health, tray tooltip, system.version, cloud), so
          # a mismatch ships a build whose advertised version differs from what
          # it reports. get-version.py is the same reader the installer uses.
          PYPROJECT_VERSION=$(python3 installer/get-version.py)
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Release tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION. Bump pyproject.toml to $TAG (or fix the tag) and re-release."
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Windows installer (.exe) ────────────────────────────────────────
  windows:
    name: Windows installer
    needs: [test, version]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      SIGNING_ENABLED: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

      - name: Install Python build deps
        run: pip install pyinstaller infi.systray -r requirements.txt

      - name: Bundle server with PyInstaller
        run: pyinstaller installer/openavc.spec --noconfirm --clean

      - name: Sign server executable
        if: env.SIGNING_ENABLED != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: openavc
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: dist/openavc
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Bundle tray app with PyInstaller
        run: pyinstaller installer/tray.spec --noconfirm --clean

      - name: Sign tray executable
        if: env.SIGNING_ENABLED != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: openavc
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: dist/openavc-tray
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} installer/setup.iss

      - name: Sign installer
        if: env.SIGNING_ENABLED != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: openavc
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/OpenAVC-Setup-*.exe

  # ── macOS installer (.pkg) ─────────────────────────────────────────
  # One native build per arch (macos-14 = Apple Silicon, macos-13 = Intel).
  # Signing + notarization gate on APPLE_TEAM_ID; with no Apple secrets the job
  # still produces a working *unsigned* .pkg (pre-enrollment / fork builds).
  macos:
    name: macOS installer (${{ matrix.arch }})
    needs: [test, version]
    runs-on: ${{ matrix.runner }}
    # Backstop against a stalled Apple-service call hanging the job for
    # GitHub's 6-hour default. The productbuild key-auth hang that bit
    # v0.22.0 is fixed at its source (keys imported with -A, below), so
    # build + signing now run in minutes. The one stage that can still
    # legitimately take hours is notarization: Apple's deep analysis
    # (common for an early Developer ID submission) held the first local
    # one ~2h. This cap must clear that, so it only ever kills a truly
    # infinite hang, never a slow-but-succeeding notarization.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    env:
      VERSION: ${{ needs.version.outputs.version }}
      SIGNING_ENABLED: ${{ secrets.APPLE_TEAM_ID }}
      # The Apple Silicon runner (macos-14, ~7 GB) sizes Node's heap lower than
      # the 16 GB Linux/Windows runners, so the Vite production build of the
      # Programmer UI hit the ~2 GB default ceiling and aborted (OOM, exit 134).
      # Give Node room; this fits comfortably in the runner's memory.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

      - name: Install Python build deps
        run: pip install pyinstaller rumps -r requirements.txt

      - name: Import signing certificates
        if: env.SIGNING_ENABLED != ''
        env:
          APPLE_APP_CERT_P12_BASE64: ${{ secrets.APPLE_APP_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/openavc-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_APP_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/app.p12"
          echo "$APPLE_INSTALLER_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/installer.p12"
          # Import with -A (any app may use the key without prompting), NOT
          # -T <tool>. The -T ACL form makes securityd evaluate an app-list
          # authorization when the key is used, and on a headless runner that
          # evaluation blocks forever: productbuild hung in securityd's
          # generateSignature the first time this signed path ran in CI
          # (v0.22.0), sampled parking 100% in SecKeyCreateSignature -> mach_msg.
          # The keychain is ephemeral and dies with the runner, so unrestricted
          # key access here carries no lasting exposure. A trivial-pkg probe
          # confirmed -A signs in 0.66s where -T hung past 4 hours.
          security import "$RUNNER_TEMP/app.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_P12_PASSWORD" -A
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" > /dev/null
          # Make our keychain the default and first in the search list so
          # codesign/productbuild find the identity.
          security default-keychain -d user -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

      - name: Write notarization key
        if: env.SIGNING_ENABLED != ''
        run: echo "${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}" | base64 -d > "$RUNNER_TEMP/notary.p8"

      - name: Build .pkg + update tarball
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SIGNING_IDENTITY: ${{ secrets.APPLE_APP_SIGNING_IDENTITY }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_PATH: ${{ runner.temp }}/notary.p8
        run: bash installer/build-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/OpenAVC-*-macos-*.pkg
            dist/openavc-*-macos-*.tar.gz

  # ── Linux archive (amd64) ──────────────────────────────────────────
  linux-amd64:
    name: Linux archive (amd64)
    needs: [test, version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

      - name: Create archive
        run: |
          mkdir -p projects/default
          ARCHIVE="openavc-${VERSION}-linux-amd64.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='installer/pi-image/pi-gen' \
            --exclude='web/programmer/node_modules' \
            --exclude='web/programmer/src' \
            --exclude='web/programmer/.env*' \
            --exclude='web/simulator/node_modules' \
            --exclude='web/simulator/src' \
            --exclude='web/simulator/.env*' \
            server/ \
            simulator/ \
            web/panel/ \
            web/programmer/dist/ \
            web/simulator/dist/ \
            themes/ \
            installer/seed/ \
            installer/openavc.service \
            installer/update-helper.sh \
            installer/trusted-keys/ \
            requirements.txt \
            pyproject.toml \
            LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: openavc-*-linux-amd64.tar.gz

  # ── Linux archive (arm64) ──────────────────────────────────────────
  linux-arm64:
    name: Linux archive (arm64)
    needs: [test, version]
    runs-on: ubuntu-24.04-arm
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Programmer UI
        working-directory: web/programmer
        run: |
          npm ci
          npm run build

      - name: Build Simulator UI
        working-directory: web/simulator
        run: |
          npm ci
          npm run build

      - name: Create archive
        run: |
          mkdir -p projects/default
          ARCHIVE="openavc-${VERSION}-linux-arm64.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='tests' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='installer/pi-image/pi-gen' \
            --exclude='web/programmer/node_modules' \
            --exclude='web/programmer/src' \
            --exclude='web/programmer/.env*' \
            --exclude='web/simulator/node_modules' \
            --exclude='web/simulator/src' \
            --exclude='web/simulator/.env*' \
            server/ \
            simulator/ \
            web/panel/ \
            web/programmer/dist/ \
            web/simulator/dist/ \
            themes/ \
            installer/seed/ \
            installer/openavc.service \
            installer/update-helper.sh \
            installer/trusted-keys/ \
            requirements.txt \
            pyproject.toml \
            LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: openavc-*-linux-arm64.tar.gz

  # ── Docker image (multi-arch) ──────────────────────────────────────
  docker:
    name: Docker image
    needs: [test, version]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: ${{ vars.DOCKERHUB_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker tags
        id: tags
        run: |
          GHCR="ghcr.io/${{ github.repository_owner }}/openavc"
          TAGS="${GHCR}:${VERSION}"
          # Only tag :latest for stable releases (no hyphen in version)
          if [[ "$VERSION" != *-* ]]; then
            TAGS="${TAGS},${GHCR}:latest"
          fi
          # Add Docker Hub tags if configured
          if [ "${{ vars.DOCKERHUB_ENABLED }}" = "true" ]; then
            TAGS="${TAGS},openavc/openavc:${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              TAGS="${TAGS},openavc/openavc:latest"
            fi
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create release
    needs: [version, windows, macos, linux-amd64, linux-arm64, docker]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      # Presence of the signing key arms artifact signing. Absent (forks,
      # pre-enrollment) → the signing step is skipped and the release ships
      # unsigned, which the client verifiers treat as "not armed" (warn, don't
      # brick). Mirrors how the Azure/Apple signing steps gate on their secrets.
      SIGNING_KEY_SET: ${{ secrets.RELEASE_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Detached EC P-256 signatures over every downloadable file (tarballs +
      # SHA256SUMS.txt + the installers). "Everything you download has a .sig;
      # verify it against the trusted public key." The Linux tarball's own .sig
      # is the authoritative gate for the root update-helper (it can't trust the
      # service-user-writable checksums channel); SHA256SUMS.txt.sig covers the
      # install.sh path. openssl dgst -verify (openssl 1.1.1 + 3.x) is the
      # verifier — no extra binary to ship, and the root helper can't use the
      # venv it's replacing. Windows/macOS installers are OS-signed already but
      # get a .sig too for a uniform model. `files: release/*` uploads the .sig
      # siblings automatically.
      - name: Sign release artifacts
        if: env.SIGNING_KEY_SET != ''
        working-directory: release
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/release-signing.key"
          ( umask 077; echo "$RELEASE_SIGNING_KEY" | base64 -d > "$KEY" )
          for f in *; do
            case "$f" in *.sig) continue ;; esac
            [ -f "$f" ] || continue
            openssl dgst -sha256 -sign "$KEY" -out "$f.sig" "$f"
            echo "signed $f -> $f.sig"
          done
          shred -u "$KEY" 2>/dev/null || rm -f "$KEY"
          ls -l

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenAVC v${{ env.VERSION }}
          draft: false
          prerelease: ${{ needs.version.outputs.prerelease }}
          body_path: .github/RELEASE_NOTES.md
          files: release/*

      - name: Trigger Pi image build
        if: ${{ needs.version.outputs.prerelease == 'false' }}
        continue-on-error: true
        run: gh workflow run release-pi.yml --ref "v$VERSION" -f "tag=v$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger marketing site rebuild
        if: ${{ needs.version.outputs.prerelease == 'false' }}
        run: |
          curl -s -X POST "${{ secrets.SITE_DEPLOY_HOOK }}"
        env:
          SITE_DEPLOY_HOOK: ${{ secrets.SITE_DEPLOY_HOOK }}

      - name: Notify Discord
        if: ${{ needs.version.outputs.prerelease == 'false' }}
        run: |
          DOWNLOAD_URL="https://openavc.com/download"
          # Character-aware truncation: jq -Rs reads the file as one raw string
          # and .[0:4000] slices by codepoint, so we never cut a multibyte UTF-8
          # char mid-sequence (head -c truncates by bytes and can emit invalid
          # UTF-8 that breaks the JSON). One encode pass, no decode/re-encode.
          EMBED_DESC_JSON=$(jq -Rs '.[0:4000]' < .github/RELEASE_NOTES.md)
          jq -n --arg title "OpenAVC v${VERSION} Released" \
                --arg url "$DOWNLOAD_URL" \
                --argjson color 5682323 \
                --argjson desc "$EMBED_DESC_JSON" \
                '{embeds: [{title: $title, url: $url, color: $color, description: ($desc + "\n\n[Download](https://openavc.com/download)")}]}' \
          | curl -s -H "Content-Type: application/json" -d @- "${{ secrets.DISCORD_WEBHOOK }}"
