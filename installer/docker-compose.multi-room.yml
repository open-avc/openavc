# OpenAVC Docker Compose - Multi-Room
#
# Each room gets its own container, port, and data volume.
# Add or remove rooms as needed.
#
# Start:   docker compose -f docker-compose.multi-room.yml up -d
# Update:  docker compose -f docker-compose.multi-room.yml pull && docker compose -f docker-compose.multi-room.yml up -d

services:
  room-101:
    image: openavc/openavc:latest
    container_name: openavc-room-101
    ports:
      - "8081:8080"
    volumes:
      - room-101-data:/data
    restart: unless-stopped

  room-102:
    image: openavc/openavc:latest
    container_name: openavc-room-102
    ports:
      - "8082:8080"
    volumes:
      - room-102-data:/data
    restart: unless-stopped

  room-103:
    image: openavc/openavc:latest
    container_name: openavc-room-103
    ports:
      - "8083:8080"
    volumes:
      - room-103-data:/data
    restart: unless-stopped

volumes:
  room-101-data:
  room-102-data:
  room-103-data:
