# OpenAVC Docker Compose - Multi-Room
#
# Each room gets its own container, port, and data volume.
# Add or remove rooms as needed.
#
# Start:   docker compose -f docker-compose.multi-room.yml up -d
# Update:  docker compose -f docker-compose.multi-room.yml pull && docker compose -f docker-compose.multi-room.yml up -d
#
# Discovery note: this multi-room layout uses bridge networking because each
# room needs its own port (8081/8082/8083). Containers in bridge mode cannot
# reach AV devices on your physical LAN, so device discovery WILL NOT WORK
# here -- you'll need to add devices manually by IP. If you need discovery,
# either run one room per physical host using docker-compose.yml (host
# networking), or set up macvlan networking so each container gets its own
# LAN IP.

services:
  room-101:
    image: ghcr.io/open-avc/openavc:latest
    container_name: openavc-room-101
    ports:
      - "8081:8080"
    volumes:
      - room-101-data:/data
    restart: unless-stopped

  room-102:
    image: ghcr.io/open-avc/openavc:latest
    container_name: openavc-room-102
    ports:
      - "8082:8080"
    volumes:
      - room-102-data:/data
    restart: unless-stopped

  room-103:
    image: ghcr.io/open-avc/openavc:latest
    container_name: openavc-room-103
    ports:
      - "8083:8080"
    volumes:
      - room-103-data:/data
    restart: unless-stopped

volumes:
  room-101-data:
  room-102-data:
  room-103-data:
