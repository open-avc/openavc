# OpenAVC Docker Compose - Single Room
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Update:  docker compose pull && docker compose up -d
# Logs:    docker compose logs -f

services:
  openavc:
    image: ghcr.io/open-avc/openavc:latest
    container_name: openavc
    # Host networking is required for device discovery and mDNS to reach
    # AV equipment on your LAN. Linux only -- on Docker Desktop for Windows
    # or Mac the container still cannot see your physical LAN due to the
    # WSL2/HyperKit network isolation, and you should use the native
    # installer instead if you need discovery.
    network_mode: host
    # NET_RAW lets the unprivileged `openavc` user run ping for the
    # discovery sweep (the image's ping binary has the matching file
    # capability set).
    cap_add:
      - NET_RAW
    volumes:
      - openavc-data:/data
    restart: unless-stopped
    # For serial/USB device passthrough, uncomment:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0

volumes:
  openavc-data:
